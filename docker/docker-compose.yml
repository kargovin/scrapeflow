services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scrapeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrapeflow}
      POSTGRES_DB: ${POSTGRES_DB:-scrapeflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scrapeflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ['-js', '-sd', '/data']
    volumes:
      - nats_data:/data
    ports:
      - '4222:4222' # client
      - '8222:8222' # monitoring
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 4222 || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scrapeflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scrapeflow_secret}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000' # API
      - '9001:9001' # Console UI
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:9000/minio/health/live || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NATS stream init (creates SCRAPEFLOW stream before API starts) ──────────

  nats-init:
    image: natsio/nats-box:latest
    restart: 'no'
    depends_on:
      nats:
        condition: service_healthy
    command: >
      sh -c "
        if nats stream info SCRAPEFLOW --server nats://nats:4222 >/dev/null 2>&1; then
          nats stream edit SCRAPEFLOW --subjects 'scrapeflow.jobs.>' --server nats://nats:4222 --force;
        else
          nats stream add SCRAPEFLOW --subjects 'scrapeflow.jobs.>' --retention work --storage file --replicas 1 --server nats://nats:4222 --defaults;
        fi
      "

  # ── API ─────────────────────────────────────────────────────────────────────

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
      target: test
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scrapeflow}:${POSTGRES_PASSWORD:-scrapeflow}@postgres:5432/${POSTGRES_DB:-scrapeflow}
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-scrapeflow}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-scrapeflow_secret}
      MINIO_SECURE: 'false'
    volumes:
      - ../api/app:/app/app
      - ../api/tests:/app/tests
      - ../api/migrations:/app/migrations
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    develop:
      watch:
        - action: sync
          path: ../api/app
          target: /app/app
        - action: rebuild
          path: ../api/pyproject.toml

  # ── Python Playwright worker ─────────────────────────────────────────────────

  playwright-worker:
    build:
      context: ../playwright-worker
    environment:
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-scrapeflow}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-scrapeflow_secret}
      MINIO_BUCKET: scrapeflow-results
      MINIO_SECURE: 'false'
      PLAYWRIGHT_MAX_WORKERS: '3'
      PLAYWRIGHT_DEFAULT_TIMEOUT_SECONDS: '60'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    restart: unless-stopped

  llm-worker:
    build:
      context: ../llm-worker
    env_file:
      - ../.env
    environment:
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-scrapeflow}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-scrapeflow_secret}
      MINIO_BUCKET: scrapeflow-results
      MINIO_SECURE: 'false'
      LLM_MAX_WORKERS: '3'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Go HTTP scraper worker ───────────────────────────────────────────────────

  http-worker:
    build:
      context: ../http-worker
      dockerfile: Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-scrapeflow}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-scrapeflow_secret}
      MINIO_BUCKET: scrapeflow-results
      MINIO_SECURE: 'false'
      FETCH_TIMEOUT_SECS: '30'
      NATS_MAX_DELIVER: '3'
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
